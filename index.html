<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Devils Head Scorecard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--accent:#0078d4;--muted:#666}
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);margin:0;padding:20px;color:#111}
    h1{text-align:center;color:var(--accent);margin:0 0 12px}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px}
    .card{background:var(--card);border-radius:8px;padding:12px;box-shadow:0 2px 6px rgba(12,35,64,0.06)}
    label{display:block;font-weight:600;margin-bottom:6px}
    select,input[type="number"]{width:100%;padding:8px;border-radius:6px;border:1px solid #d6dbe6;font-size:14px;box-sizing:border-box}
    .grid-wrapper{overflow:auto;margin-top:8px}
    table{border-collapse:collapse;width:100%;min-width:640px;font-size:13px}
    th,td{border:1px solid #e6e9ef;padding:6px;text-align:center}
    th{background:#f3f6fb;font-weight:700;color:#0b3d91}
    .hole-input{width:3.2rem;padding:4px}
    .total-cell{font-weight:700;background:#fafcff}
    .submit-row{text-align:center;margin-top:12px}
    button{background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:15px;cursor:pointer}
    button[disabled]{opacity:.6;cursor:not-allowed}
    .status{margin-top:8px;text-align:center;color:var(--muted);font-size:14px}
    @media (max-width:640px){.controls{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h1>Devils Head Scorecard</h1>

  <form id="scoreForm" class="score-form" autocomplete="off">
    <div class="controls">
      <div class="card" aria-labelledby="chooseDayLabel1">
        <label id="chooseDayLabel1" for="daySelect1">Choose Day</label>
        <select id="daySelect1" name="daySelect1" required>
          <option value="">Select Day</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
        </select>
      </div>

      <div class="card" aria-labelledby="chooseDayLabel2">
        <label id="chooseDayLabel2" for="daySelect2">Choose Day</label>
        <select id="daySelect2" name="daySelect2" required>
          <option value="">Select</option>
          <option value="1">1</option><option value="2">2</option><option value="3">3</option>
          <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="card">
        <label for="teamNumber">Team Number</label>
        <select id="teamNumber" name="teamNumber" required>
          <option value="">Select Team</option>
          <option value="1">1</option><option value="2">2</option><option value="3">3</option>
          <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>
    </div>

    <div id="grids"></div>

    <div class="submit-row">
      <button id="submitBtn" type="submit">Submit & Create CSV</button>
      <div id="status" class="status">Ready</div>
    </div>
  </form>

  <script>
  // ====== Configuration ======
  const webhookUrl = "https://hook.us2.make.com/rlnohhnoz8b06qiqrgyc718kx1kxxfbv"; // your Make webhook
  const SECRET_TOKEN = ""; // optional: set a token and validate in Make

  // ====== Helpers ======
  function createGrid9(title, gridId, playerLabels = ["P1","P2","P3","P4"]) {
    return `
      <div class="card" id="${gridId}_card">
        <h2 style="font-size:16px;margin:0 0 8px">${title}</h2>
        <div class="grid-wrapper">
          <table aria-labelledby="${gridId}_label">
            <thead>
              <tr>
                <th>Player</th>
                <th>H1</th><th>H2</th><th>H3</th><th>H4</th><th>H5</th>
                <th>H6</th><th>H7</th><th>H8</th><th>H9</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              ${playerLabels.map((pl, idx) => `
                <tr>
                  <td style="text-align:left;padding-left:8px;font-weight:600">${pl}</td>
                  ${[1,2,3,4,5,6,7,8,9].map(h => `
                    <td><input class="hole-input score-input" data-grid="${gridId}" data-player="${idx+1}" data-hole="${h}" type="number" min="0" inputmode="numeric" /></td>
                  `).join('')}
                  <td class="total-cell" id="${gridId}_p${idx+1}_total">0</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  function createGrid10to18(title, gridId, playerLabels = ["A","B","C","D"]) {
    return `
      <div class="card" id="${gridId}_card">
        <h2 style="font-size:16px;margin:0 0 8px">${title}</h2>
        <div class="grid-wrapper">
          <table aria-labelledby="${gridId}_label">
            <thead>
              <tr>
                <th>Player</th>
                <th>H10</th><th>H11</th><th>H12</th><th>H13</th><th>H14</th>
                <th>H15</th><th>H16</th><th>H17</th><th>H18</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              ${playerLabels.map((pl, idx) => `
                <tr>
                  <td style="text-align:left;padding-left:8px;font-weight:600">${pl}</td>
                  ${[10,11,12,13,14,15,16,17,18].map(h => `
                    <td><input class="hole-input score-input" data-grid="${gridId}" data-player="${idx+1}" data-hole="${h}" type="number" min="0" inputmode="numeric" /></td>
                  `).join('')}
                  <td class="total-cell" id="${gridId}_p${idx+1}_total">0</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  // Insert grids
  document.getElementById('grids').innerHTML =
    createGrid9("Game 1 (H1–H9)", "g1", ["P1","P2","P3","P4"]) +
    createGrid10to18("Game 2 (H10–H18)", "g2", ["A","B","C","D"]) +
    createGrid9("Game 3 (H1–H9)", "g3", ["P1","P2","P3","P4"]);

  // Recalculate totals when inputs change
  function recalcTotal(grid, player) {
    const inputs = Array.from(document.querySelectorAll(`[data-grid="${grid}"][data-player="${player}"]`));
    let sum = 0;
    inputs.forEach(i => {
      const v = i.value.trim();
      if (v !== "" && !isNaN(v)) sum += Number(v);
    });
    const el = document.getElementById(`${grid}_p${player}_total`);
    if (el) el.textContent = sum || 0;
  }

  document.addEventListener('input', (e) => {
    if (!e.target.classList.contains('score-input')) return;
    const grid = e.target.dataset.grid;
    const player = e.target.dataset.player;
    recalcTotal(grid, player);
  });

  // Build payload for Make
  function buildPayload() {
    const day1 = document.getElementById('daySelect1').value || "";
    const day2 = document.getElementById('daySelect2').value || "";
    const team = document.getElementById('teamNumber').value || "";
    const filename = `${day1 || 'Day'}_Team${team || 'X'}.csv`;

    const payload = {
      filename: filename,
      secret: SECRET_TOKEN || undefined,
      meta: { day1, day2, team, submittedAt: new Date().toISOString() },
      grids: []
    };

    const grids = [
      { id: 'g1', holes: [1,2,3,4,5,6,7,8,9] },
      { id: 'g2', holes: [10,11,12,13,14,15,16,17,18] },
      { id: 'g3', holes: [1,2,3,4,5,6,7,8,9] }
    ];

    grids.forEach(g => {
      for (let p = 1; p <= 4; p++) {
        const row = { grid: g.id, player: `P${p}`, holes: {} };
        g.holes.forEach(h => {
          const el = document.querySelector(`[data-grid="${g.id}"][data-player="${p}"][data-hole="${h}"]`);
          row.holes[h] = el?.value?.trim() || "";
        });
        payload.grids.push(row);
      }
    });

    return payload;
  }

  // POST to Make and handle response
  async function postToMake(payload) {
    const statusEl = document.getElementById('status');
    statusEl.textContent = 'Sending...';
    const resp = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) {
      const text = await resp.text().catch(()=>null);
      throw new Error('Network error: ' + resp.status + (text ? ' - ' + text : ''));
    }
    // Expect JSON response from Make scenario
    return resp.json().catch(()=>({}));
  }

  // Download helpers
  function downloadTextAsCsv(filename, text, addBom = true) {
    const bom = addBom ? '\uFEFF' : '';
    const blob = new Blob([bom + text], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function downloadBase64File(filename, base64, mime = 'text/csv') {
    const byteChars = atob(base64);
    const byteNumbers = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
    const byteArray = new Uint8Array(byteNumbers);
    const blob = new Blob([byteArray], { type: mime + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  // Submit handler
  document.getElementById('scoreForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status');

    // Basic validation
    const day1 = document.getElementById('daySelect1').value;
    const day2 = document.getElementById('daySelect2').value;
    const team = document.getElementById('teamNumber').value;
    if (!day1 || !day2 || !team) {
      statusEl.textContent = 'Please select both Choose Day fields and Team Number.';
      return;
    }

    submitBtn.disabled = true;
    statusEl.textContent = 'Preparing payload...';

    try {
      const payload = buildPayload();
      statusEl.textContent = 'Sending to Make...';
      const result = await postToMake(payload);

      // Pattern A: Make returns a download URL (Drive link)
      if (result.downloadUrl) {
        statusEl.textContent = 'File created. Opening download link...';
        // open in new tab; user can download from Drive UI
        window.open(result.downloadUrl, '_blank');
        submitBtn.disabled = false;
        statusEl.textContent = 'Done. File available via link.';
        return;
      }

      // Pattern B: Make returns raw CSV text
      if (result.csvText) {
        const filename = result.filename || payload.filename;
        downloadTextAsCsv(filename, result.csvText, true);
        statusEl.textContent = 'CSV downloaded.';
        submitBtn.disabled = false;
        return;
      }

      // Pattern C: Make returns base64 file
      if (result.fileBase64) {
        const filename = result.filename || payload.filename;
        downloadBase64File(filename, result.fileBase64, 'text/csv');
        statusEl.textContent = 'CSV downloaded.';
        submitBtn.disabled = false;
        return;
      }

      // Fallback
      statusEl.textContent = 'Submission sent. Check Make scenario logs for file creation.';
      submitBtn.disabled = false;
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'Error: ' + (err.message || 'Submission failed');
      submitBtn.disabled = false;
    }
  });
  </script>
</body>
</html>
