<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Devils Head Scorecard</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; max-width:900px; margin:28px auto; padding:0 18px; color:#111; }
    h1 { margin-bottom:8px; }
    label { display:block; margin-top:12px; font-weight:600; }
    input[type="text"], textarea, select { width:100%; padding:8px; margin-top:6px; box-sizing:border-box; font-size:14px; }
    .row { display:flex; gap:12px; }
    .col { flex:1; }
    .small { max-width:220px; }
    button { margin-top:14px; padding:10px 14px; font-size:16px; cursor:pointer; }
    .hidden { display:none !important; height:0; overflow:hidden; }
    .note { font-size:13px; color:#555; margin-top:8px; }
    pre.sample { background:#f7f7f7; padding:10px; border-radius:4px; font-size:13px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>Devils Head Scorecard</h1>

  <!-- FormSubmit action uses the email you provided -->
  <form id="scoreForm" action="https://formsubmit.co/cfields091215@gmail.com" method="POST" autocomplete="off">
    <!-- FormSubmit hidden fields -->
    <input type="hidden" name="_subject" value="New Scorecard Submission">
    <input type="hidden" name="_captcha" value="false">
    <!-- Redirect after submit; change to your actual page if desired -->
    <input type="hidden" name="_next" value="https://your-github-pages-site.github.io/thank-you.html">

    <!-- Honeypot anti-spam -->
    <div class="hidden" aria-hidden="true">
      <label>Leave this empty<input name="_honey" autocomplete="off"></label>
    </div>

    <!-- Basic metadata -->
    <div class="row">
      <div class="col small">
        <label>Day
          <input name="day" type="text" id="day" required value="Friday">
        </label>
      </div>
      <div class="col small">
        <label>Team
          <input name="team" type="text" id="team" required value="3">
        </label>
      </div>
      <div class="col">
        <label>Filename
          <input name="filename" type="text" id="filename" required value="FridayTeam3.csv">
        </label>
      </div>
    </div>

    <p class="note">Enter each game's rows as comma-separated values. Leave blank rows where needed. Defaults match your previous CSV layout.</p>

    <!-- Game 1 -->
    <label>Game 1 (single row of 9 scores)
      <input name="game1" id="game1" type="text" placeholder="e.g. 5,5,5,5,5,5,5,5,5" value="5,5,5,5,5,5,5,5,5">
    </label>

    <!-- Spacer blank rows count for Game1 -->
    <label>Blank rows after Game 1
      <select id="g1Blanks">
        <option value="2">2 blank rows</option>
        <option value="1">1 blank row</option>
        <option value="0">0 blank rows</option>
      </select>
    </label>

    <!-- Game 2: multiple labeled rows A-D -->
    <label>Game 2 - Row A (e.g., A,1,2,3,4,5,6,7,8,9)
      <input name="g2a" id="g2a" type="text" placeholder="A,1,2,3,4,5,6,7,8,9" value="A,1,2,3,4,5,6,7,8,9">
    </label>
    <label>Game 2 - Row B (leave blank if none)
      <input name="g2b" id="g2b" type="text" placeholder="B,,,,,,,," value="B,,,,,,,,">
    </label>
    <label>Game 2 - Row C (leave blank if none)
      <input name="g2c" id="g2c" type="text" placeholder="C,,,,,,,," value="C,,,,,,,,">
    </label>
    <label>Game 2 - Row D (leave blank if none)
      <input name="g2d" id="g2d" type="text" placeholder="D,,,,,,,," value="D,,,,,,,,">
    </label>

    <!-- Spacer blank rows count for Game2 -->
    <label>Blank rows after Game 2
      <select id="g2Blanks">
        <option value="2">2 blank rows</option>
        <option value="1">1 blank row</option>
        <option value="0">0 blank rows</option>
      </select>
    </label>

    <!-- Game 3 -->
    <label>Game 3 (single row of 9 scores)
      <input name="game3" id="game3" type="text" placeholder="e.g. 9,8,7,6,5,4,3,2,1" value="9,8,7,6,5,4,3,2,1">
    </label>

    <!-- Final blank rows -->
    <label>Trailing blank rows
      <select id="trailingBlanks">
        <option value="2">2 blank rows</option>
        <option value="1">1 blank row</option>
        <option value="0">0 blank rows</option>
      </select>
    </label>

    <!-- Hidden CSV field that will be posted -->
    <label class="hidden">CSV<textarea id="csvField" name="csv" rows="8"></textarea></label>

    <button type="submit">Submit Scorecard</button>
  </form>

  <h3>Sample CSV this form produces</h3>
  <pre class="sample" id="sampleCsv"></pre>

  <script>
    // Build CSV string from form inputs to match your previous layout
    function buildCsv() {
      const day = document.getElementById('day').value || '';
      const team = document.getElementById('team').value || '';
      const filename = document.getElementById('filename').value || '';

      const g1 = (document.getElementById('game1').value || '').trim();
      const g1Blanks = parseInt(document.getElementById('g1Blanks').value, 10);

      const g2a = (document.getElementById('g2a').value || '').trim();
      const g2b = (document.getElementById('g2b').value || '').trim();
      const g2c = (document.getElementById('g2c').value || '').trim();
      const g2d = (document.getElementById('g2d').value || '').trim();
      const g2Blanks = parseInt(document.getElementById('g2Blanks').value, 10);

      const g3 = (document.getElementById('game3').value || '').trim();
      const trailingBlanks = parseInt(document.getElementById('trailingBlanks').value, 10);

      // Helper to add blank lines
      function blanks(n) { return Array(n).fill('').join('\n'); }

      // Build the CSV exactly in the structure you used before
      const parts = [];
      parts.push(`${day} Team ${team}`); // top line like "Friday Team 3"
      parts.push(''); // blank line to match earlier top spacing

      // Game1
      parts.push('Game1');
      parts.push(g1);
      if (g1Blanks > 0) parts.push(blanks(g1Blanks));

      // Game2
      parts.push('Game2');
      if (g2a) parts.push(g2a);
      if (g2b) parts.push(g2b);
      if (g2c) parts.push(g2c);
      if (g2d) parts.push(g2d);
      if (g2Blanks > 0) parts.push(blanks(g2Blanks));

      // Game3
      parts.push('Game3');
      parts.push(g3);
      if (trailingBlanks > 0) parts.push(blanks(trailingBlanks));

      // Join with single newlines; ensure final newline
      let csv = parts.join('\n') + '\n';
      return csv;
    }

    // Populate CSV field and sample preview on load and before submit
    function refreshPreview() {
      const csv = buildCsv();
      document.getElementById('csvField').value = csv;
      document.getElementById('sampleCsv').textContent = csv;
    }

    document.addEventListener('DOMContentLoaded', () => {
      refreshPreview();
      // Rebuild preview when inputs change
      const inputs = document.querySelectorAll('#scoreForm input, #scoreForm select');
      inputs.forEach(i => i.addEventListener('input', refreshPreview));
    });

    // Ensure CSV is rebuilt just before submit
    document.getElementById('scoreForm').addEventListener('submit', (e) => {
      // Honeypot check: if filled, stop submission
      const honey = document.querySelector('input[name="_honey"]').value;
      if (honey && honey.trim() !== '') {
        e.preventDefault();
        return;
      }
      document.getElementById('csvField').value = buildCsv();
      // Let the form submit normally to FormSubmit.co
    });
  </script>
</body>
</html>
